<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RouteFinder — Directions</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="directions.css"/>
</head>
<body>

  <!-- ════ LEFT PANEL ════ -->
  <aside class="side-panel" id="sidePanel">

    <!-- Header -->
    <div class="panel-header">
      <a href="routes.html" id="backToRoutes" class="icon-btn" title="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>

      <div class="panel-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 38 38" fill="none"><path d="M33 5L5 17l11 4 4 11 13-27z" fill="white" opacity="0.9"/><path d="M16 21l5-5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <span class="brand-name">RouteFinder</span>
      </div>

      <div class="header-actions">
        <!-- Light / dark toggle -->
        <button class="icon-btn" id="themeBtn" title="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <!-- Collapse panel -->
        <button class="icon-btn" id="collapseBtn" title="Hide panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
    </div>

    <!-- Route summary -->
    <div class="route-summary">
      <div class="summary-name" id="summaryName">Loading…</div>
      <div class="summary-endpoints">
        <div class="endpoint">
          <div class="ep-dot ep-from"></div>
          <span class="ep-text" id="summaryFrom">—</span>
        </div>
        <div class="ep-connector"></div>
        <div class="endpoint">
          <div class="ep-dot ep-to"></div>
          <span class="ep-text" id="summaryTo">—</span>
        </div>
      </div>
      <div class="summary-stats">
        <div class="stat" id="statTime">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>—</span>
        </div>
        <div class="stat" id="statDist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>—</span>
        </div>
        <div class="stat" id="statProfile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          <span>—</span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="panel-tabs">
      <button class="ptab active" data-tab="directions">Directions</button>
      <button class="ptab" data-tab="attractions">Attractions</button>
      <button class="ptab" data-tab="about">About</button>
    </div>

    <!-- Directions tab -->
    <div class="tab-content active" id="tab-directions">
      <div class="steps-list" id="stepsList">
        <div class="loading-state">
          <div class="spin"></div>
          <span>Calculating route…</span>
        </div>
      </div>
    </div>

    <!-- Attractions tab -->
    <div class="tab-content" id="tab-attractions">
      <div class="attractions-list" id="attractionsList">
        <div class="loading-state">
          <div class="spin"></div>
          <span>Finding attractions…</span>
        </div>
      </div>
    </div>

    <!-- About tab -->
    <div class="tab-content" id="tab-about">
      <div class="about-content" id="aboutContent">
        <div class="loading-state"><div class="spin"></div></div>
      </div>
    </div>

  </aside>

  <!-- ════ MAP ════ -->
  <div class="map-wrap" id="mapWrap">
    <div id="map"></div>

    <!-- Expand button (shown when panel collapsed) -->
    <button class="expand-btn hidden" id="expandBtn" title="Show panel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- GPS status banner -->
    <div class="gps-banner hidden" id="gpsBanner"></div>

    <!-- Next step banner -->
    <div class="next-step-banner hidden" id="nextStepBanner">
      <div class="nsb-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </div>
      <div class="nsb-body">
        <div class="nsb-text">—</div>
        <div class="nsb-dist"></div>
      </div>
    </div>

    <!-- Follow-me button -->
    <div class="map-controls">
      <button class="map-ctrl-btn" id="followBtn" title="Follow my location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <circle cx="12" cy="12" r="8" opacity="0.3"/>
        </svg>
      </button>
    </div>

    <!-- Footer bar -->
    <div class="map-footer">
      <span class="mf-loc" id="mfFrom">—</span>
      <svg class="mf-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      <span class="mf-loc" id="mfTo">—</span>
      <div class="mf-spacer"></div>
      <span class="mf-stat" id="mfTime">—</span>
      <span class="mf-sep">·</span>
      <span class="mf-stat" id="mfDist">—</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="directions.js"></script>
</body>
</html>
